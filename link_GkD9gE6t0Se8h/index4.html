<!DOCTYPE html>
<html lang="en">
    

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>    
</head>
<style>
    #loading_content {
		position: relative;
		height: 100%;
	}

	/* .loading_img_block{
		height: 90%;
	} */
	.loading_img_block {
		position: absolute;
		top: 0px;
		left: 0px;
		right: 0px;
		bottom: 0px;
		margin: auto;
		width: 60%;
		height: 28%;
	}

	#progressbar {
		width: 70%;
		height: 10px;
		background-color: #ffffff;
		border: 1px solid #fbca4b;
		text-align: center;
		border-radius: 8px;
		margin: 5% auto;
	}

	#progress-label {
		display: block;
		font-size: 12px;
		background-color: #f6b91b;
		text-align: center;
		border-radius: 5px;
		height: 100%;
	}
    .progress-label-animation {
		-webkit-animation: progress 0.5s linear forwards;
		animation: progress 0.5s linear forwards;
	}
</style>
<body>
    <div id="loading_content">
        <div class="loading_img_block">
            <img src="./ezblock-logo-color.svg" alt="">
            <div id="progressbar">
                <span id="progress-label" style="width: 25%"></span>
            </div>
        </div>
    </div>
	<script>
	// 页面资源是否加载完成
		function showMainContent() {
			document.getElementById('progress-label').className = "progress-label-animation";
			setTimeout(function () {
				document.getElementById("loading_content").style.display = "none";
			}, 1000);
			
			return true
		}
		document.onreadystatechange = function () {
			if (document.readyState == "loading") {
				console.log("loading")
				document.getElementById('progress-label').style.width = 45 + "%";
			}
			// document.getElementById('progress-label').style.width = 25 + "%";
			if (document.readyState == "complete" || document.readyState == "loaded") {
				console.log("complete")
				showMainContent();
				var my_timer = setTimeout(function () {
					if (window.disableReload) {
						window.disableReload();
					}
				}, 200)

			}
		};
		var link_location = {};
		var abroadUrl = 'https://ezblock.cc/ezblock_a6Bs79D3p5d0/index.html?lang=en'; //国外
		var localUrl = 'https://ezblock.com.cn/ezblock_i9nH2d3K10l6/index.html?lang=zh-hans&distributor=mammoth'; // 国内
		var localTestUrl = "http://ezblock.com.cn/ezblock_studio/index.html?lang=zh-hans&distributor=mammoth"; //3.0 国内
		var abroadTestUrl = "http://ezblock.cc/ezblock_studio/index.html?lang=en"; // 3.0 国外
		link_location.changeSever = function () {
			var result = '';
			var url = "";
			var xmlhttp = new XMLHttpRequest();
			try {
				xmlhttp.open("POST", "https://ezblock.cc:11000/api/web/v2/ezblock/member/country", false);
				xmlhttp.send();
				if (xmlhttp.status === 200) {
					result = JSON.parse(xmlhttp.responseText).data;
					console.log(window.localStorage);
					if (result == 'China') {
						if(!window.localStorage.getItem("myVersion") || window.localStorage.getItem("myVersion") == "2.x"){
							// 2.0 版本
							console.log("国内 2.0");
							window.location.href = localUrl;
						}
						if(window.localStorage.getItem("myVersion") == "3.x"){
							// 3.0 版本
							console.log("国内 3.0");
							window.location.href = localTestUrl;

						} 
					} else {
						if(!window.localStorage.getItem("myVersion") || window.localStorage.getItem("myVersion") == "2.x"){
							// 2.0 版本
							console.log("国外 2.0");
							window.location.href = abroadUrl;
						}
						if(window.localStorage.getItem("myVersion") == "3.x"){
							// 3.0 版本
							console.log("国外 3.0");
							window.location.href = abroadTestUrl;
						}
					}
				} else {
					window.location.href = abroadUrl;
				}
			}
			catch(e){
				console.log(e,"接口报错")
			}
			// window.location.href = url;
			return result;
		}
		window.onload = function () {
			link_location.changeSever();
		}
	</script>

</body>

</html>
