var linkGetLocation = async function () {
         var result = '';
         var xmlhttp = new XMLHttpRequest();
         try {
             xmlhttp.open("POST", "https://ezblock.cc:11000/api/web/v2/ezblock/member/country", false);
             xmlhttp.send();
             if (xmlhttp.status === 200) {
                 result = JSON.parse(xmlhttp.responseText).data;
             } else {
                 result = "";
             }
         }
         catch{
             result = ""
         }
        
         return result;
    }

    var getLocation =    async function (){
        var country = await linkGetLocation();
        if(country == 'China'){
            document.getElementById("title2").innerText = '服务器升级中，预计会在2021/09/10 09:30前恢复，敬请期待！' 
        }else{
            document.getElementById("title2").innerText = 'Server upgrade in progress, expected to be restored by  2021/09/10 09:30,please look forward to it!' 
        }
    }
    
    window.onload = function () { 
        getLocation();
     }
