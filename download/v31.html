<script>
  downloadImage = function () {
    var lan = getCookie('lan');
    //选取语言文字
    switch (lan) {
      case 'cn':
        var url = cn["img_url_latest"]; //这里cn[m]中的cn是上面定义的json字符串的变量名，m是json中的键，用此方式读取到json中的值
        break;
      default:
        var url = en["img_url_latest"];
    }
    var a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.click();
  }
  downloadImageBeta = function () {
    var lan = getCookie('lan');
    //选取语言文字
    switch (lan) {
      case 'cn':
        var url = cn["img_url_latestBeta"]; //这里cn[m]中的cn是上面定义的json字符串的变量名，m是json中的键，用此方式读取到json中的值
        break;
      default:
        var url = en["img_url_latestBeta"];
    }
    var a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.click();
  }
</script>
