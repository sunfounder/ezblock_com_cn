<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EzBlock</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
</head>

<body>
  <div id="download">
    <div id="weChart" class="dis_none">
      <div class="tip">
        <p>请使用本地浏览器打开</p>
        <p>
          点击右上角，选择在默认浏览器打开
        </p>
        <img src="./open_local_browser.png" alt="">
      </div>
    </div>
    <div id="browser" class="">
      <div id="sunFounder_intro">
        <div class="product_cards">
          <div class="icon">
            <img src="icon.webp" alt="">
          </div>
          <div class="text_intro">
            <p class="name">EzBlock Studio</p>
            <p class="app_version">版本：3.2.159</p>
          </div>
          <div class="detail_intro">
            <p class="intro1">EzBlock Studio
              是一个用于编程和控制SunFounder树莓派机器人的应用，它允许初学者（学生）快速入门树莓派机器人编程。它内置了TTS、摄像头识别、遥控、音乐/声效以及传感器控制功能。</p>
            <!-- <p class="intro2">能够通过蓝牙连接百变积木控制板，让孩子们在手机或平板上轻松学习编程，激发创造力，制作属于自己的项目。</p> -->
            <div class="updates_content">
              <span class="updates">更新内容</span>
              <span>EzBlock Studio 正式版本 3.2.159 已经发布。欢迎下载使用！</span>
            </div>
          </div>
        </div>
        <div class="googlePlay">
          <a id="googlePlay_link" href="#">
            <img class="googlePlay_img" alt='' src='' />
          </a>
          <a id="appStore" href="https://apps.apple.com/cn/app/ezblock-studio/id1460776075"
            style="display: inline-block; overflow: hidden; border-radius: 13px; width: 200px; height: 83px;">
            <img class="AppStore" src="" alt="Download on the App Store"
              style="border-radius: 13px; width: 200px; height: 83px;">
          </a>
          <a id="download_url" href="#">下载APK</a>
          <div id="download_apk_zh">
            <a id="download_apk" href="#">
              <button class="download_btn">立即下载</button>
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('load', function () {
      /*浏览器版本信息*/
      let browser = function () {
        let u = navigator.userAgent;
        return {//移动终端浏览器版本信息
          trident: u.indexOf('Trident') > -1, // IE
          presto: u.indexOf('Presto') > -1, // opera
          webKit: u.indexOf('AppleWebKit') > -1 || u.indexOf('Mac') > -1, // 苹果、谷歌
          gecko: u.indexOf('Gecko') > -1 && u.indexOf('KHTML') == -1, // 火狐
          mobile: !!u.match(/AppleWebKit.*Mobile.*/) || !!u.match(/AppleWebKit/), // 是否为移动终端
          ios: !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/), // ios终端
          android: u.indexOf('Android') > -1 || u.indexOf('Linux') > -1, // android终端或者uc浏览器
          iPhone: u.indexOf('iPhone') > -1, // 是否为iPhone或者QQHD浏览器
          iPad: u.indexOf('iPad') > -1, // 是否iPad
          webApp: u.indexOf('Safari') == -1, // 是否web应该程序，没有头部与底部,
          weChart: u.indexOf('MicroMessenger') > -1
        };
      }
      var url = window.location.href;
      if (!url.includes('lang=en')) {
        document.querySelector('#appStore').style.display = "none";
      } else {
        document.querySelector('#googlePlay_link img').src = "https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png";
        document.querySelector('#appStore img').src = "https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83&amp;releaseDate=1685491200"
        document.querySelector('.AppStore').style.display = "block";
        document.querySelector('#appStore').style.display = "block";
        document.querySelector('.name').textContent = "EzBlock Studio";
        document.querySelector('.intro1').textContent = "EzBlock Studio is an application for programming and controlling SunFounder Raspberry Pi robots, which allows beginners (students) to quickly get started with Raspberry Pi robot programming. It has built-in TTS, camera recognition, remote control, music/sound effects, and sensor control.";
        // document.querySelector('.intro2').textContent = "It allows students to learn programming easily on their phones or tablets by connecting to the versatile building block controller via Bluetooth, inspiring creativity and enabling them to create their own projects.";
        document.querySelector('.updates').textContent = "Updates";
        document.querySelector('.updates_content span:nth-child(2)').textContent = "EzBlock Studio official version 3.2.159 has been released. Welcome to download and use it!";
        document.querySelector('.app_version').textContent = "version: 3.2.159";
        document.querySelector('#download_url').textContent = "Download APK";

        if (!browser().iPad || !browser().iPhone) {
          document.querySelector('#appStore').style.display = "none";
        }
        document.querySelector('#download_apk_zh').style.display = 'none';
        let googlePlay_link = document.getElementById('googlePlay_link');
        googlePlay_link.href = 'https://play.google.com/store/search?q=ezblock+studio&c=apps'
        document.querySelector('#googlePlay_link').style.display = 'block';
        document.querySelector('#download_url').style.display = 'block';
      }


      let getLinkApk = document.getElementById("download_apk");
      let getLinkApks = document.getElementById("download_url");
      if (browser().iPad || browser().iPhone) {
        getLinkApk.href = "https://apps.apple.com/cn/app/ezblock-studio/id1460776075 "; // ios版本的下载地址
        getLinkApks.href = "https://apps.apple.com/cn/app/ezblock-studio/id1460776075"; // ios版本的下载地址
        if (url.includes('lang=en')) {
          document.querySelector('#appStore').style.display = 'block';
        }
        document.querySelector('#googlePlay_link').style.display = 'none';
        document.querySelector('#download_url').style.display = 'none';
      } else if (browser().android) {
        getLinkApk.addEventListener('click', function () {
          if (browser().weChart) {
            document.getElementById("browser").classList.add('dis_none');
            document.getElementById("weChart").classList.remove('dis_none');
          } else {
            document.getElementById("weChart").classList.add('dis_none');
            document.getElementById("browser").classList.remove('dis_none');
          }
        })
        if (!browser().weChart) {
          getLinkApk.href = "https://ezblock.cc/download/app/ezblock-studio-3.2.159-android.apk";
          getLinkApks.href = "https://ezblock.cc/download/app/ezblock-studio-3.2.159-android.apk";
        }
      } else if (browser().webKit) {
        getLinkApk.href = "https://ezblock.cc/download/app/ezblock-studio-3.2.159-android.apk";
        getLinkApks.href = "https://ezblock.cc/download/app/ezblock-studio-3.2.159-android.apk";
      }

    })
  </script>
</body>

</html>
