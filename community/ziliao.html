<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title></title>

    <link rel="shortcut icon" href="./images/icon.png">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/header&footer.css">
    <link rel="stylesheet" href="../css/font-awesome.min.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="./css/comment.css">
    <link rel="stylesheet" href="../css/user.css">
    <link rel="stylesheet" href="./css/community.css">
    <script type="text/javascript" src="../js/tohttps.js"></script>
</head>

<body>
    <!-- 头部 start -->
   <section id="header" class="no-header"></section>
    <!--/#header-->


    <!-- 内容主体 start -->
    <div class="wrap cl">
        <div class="user-infos user-homepage">
            <a href="/userinfo" class="btn-avatar"><span class="icon-uedit"></span></a>
            <img class="img myavator" src="./images/avatar.png" height="121" width="121">
            <div class="name" lid=""><a href="#"></a>
            </div>
            <div class="slogan"></div>
            <div class="info"><span class="ico-address"></span> </div>
            <div class="ranking">
                <div class="item">排名：<span class="blue"></span></div>
                <div class="item">人气：<span class="blue"></span></div>
                <div class="item">粉丝：<span class="blue"></span></div>
            </div>
            <!-- <div class="btn-box"> -->
            <a href="javascript:;" followid="" class="btn btn-gz btn-blue" set-lan="html:btn_gz"></a>
            <a href="javascript:;" uid="" class="btn msg dis btn-letter" style="min-width: 100px" set-lan="html:btn_letter"></a>
            <!-- </div> -->
        </div>
    </div>
    <div class="other-box" id="other-box">
        <div class="t-menu fixed" id="t-menu">
            <ul>
                <li class="myown" onclick="Community.renderTab('myown-item',event);Community.getOwnProject()" style="display: none">
                    <a href="JavaScript:void(0)" set-lan="html:ziliao_originalProject">原创作品</a>
                </li>
                <li class="share" onclick="Community.renderTab('share-item',event);Community.shareProjects()">
                    <a href="JavaScript:void(0)" class="t-menu-on" set-lan="html:ziliao_sharedProject"></a>
                </li>
                <li onclick="Community.renderTab('like-item',event)">
                    <a href="JavaScript:void(0)" set-lan="html:ziliao_likedProject"></a>
                </li>
                <li onclick="Community.renderTab('collection-item',event);">
                    <a href="JavaScript:void(0)" set-lan="html:ziliao_collectedProject"></a>
                </li>
                <li>
                    <a rel="nofollow" href="JavaScript:void(0)" set-lan="html:ziliao_followed"></a>
                </li>
                <li onclick="Community.renderTab('user-basedata',event);">
                    <a rel="nofollow" href="JavaScript:void(0)" class="personal" set-lan="html:ziliao_userdata"><b></b></a>
                </li>
            </ul>
        </div>
        <div class="wrap personal-item">

            <div class="no-result" style="display: none;">
                <img src="./images/avatar.png" style="white-space: 200px">
                <h2>TA暂未发布过原创作品</h2>
            </div>

            <!-- 原创作品 -->
            <div class="ezblock-box myown-item">
                <ul class="list">


                    <script>
                        // 删除作品
                        function delform(tid) {
                            $.msgBox.Confirm('删除作品', '确定要删除该作品吗？', function () {
                                $.post("/userinfo/delforum", {
                                    tid: tid
                                }, function (data) {
                                    $.msgBox.Alert(null, '删除成功');
                                    $("#li_" + tid).remove();
                                })
                            });
                        }
                    </script>
                </ul>
                <div class="page-gray page-homepage">
                    <div class="page page-gray">
                    </div>
                </div>
            </div>

            <!-- 分享到社区的作品 -->
            <div class="ezblock-box share-item" style="display: none">
                <ul class="list">
                </ul>
                <div class="page-gray page-homepage">
                    <div class="page page-gray">
                    </div>
                </div>
            </div>

            <!-- 收藏的作品 -->
            <div class="ezblock-box collection-item" style="display: none">
                <ul class="list">
                </ul>
                <div class="page-gray page-homepage">
                    <div class="page page-gray">
                    </div>
                </div>
            </div>

            <!-- 我点赞的作品 -->
            <div class="ezblock-box like-item" style="display: none">
                <ul class="list">
                </ul>
                <div class="page-gray page-homepage">
                    <div class="page page-gray">
                    </div>
                </div>
            </div>

            <!-- 用户基本资料 -->
            <div class="ezblock-box user-basedata" style="display: none">
                <div class="box-title"><span set-lan="html:myData_title"></span></div>
                <div class="box-info" style="padding: 40px 60px;">
                    <ul>
                        <li class="item username">
                            <div class="title"><span set-lan="html:myData_username"></span></div>
                            <div class="info"><span></span></div>
                        </li>
                        <li class="item intro">
                            <div class="title"><span set-lan="html:myData_intro"></span></div>
                            <div class="info"><span></span></div>
                        </li>
                        <li class="item sex">
                            <div class="title"><span set-lan="html:myData_sex"></span></div>
                            <div class="info"><span></span></div>
                        </li>
                        <li class="item country">
                            <div class="title"><span set-lan="html:myData_country"></span></div>
                            <div class="info"><span></span></div>
                        </li>
                        <li class="item age">
                            <div class="title"><span set-lan="html:myData_age"></span></div>
                            <div class="info"><span></span></div>
                        </li>
                        <li class="item job">
                            <div class="title"><span set-lan="html:myData_job"></span></div>
                            <div class="info"><span></span></div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>



    <!-- 私信弹窗 -->
    <div class="popup-box popup-letter" style="display:none">
        <div class="popup" style="margin-top:-303px;margin-left: -430px">
            <div class="user-msgct">
                <div class="user-msgct-tit">
                    <div class="fr popup-close">
                        <span class="icon-close">

                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>




    <input id="favid" value="-1" type="hidden">
    <input id="followid" value="0" type="hidden">

    <div id="loading"></div>
    <div id="masks"></div>
    <div id="feedback"></div>


    <footer id="footer"></footer>
    <!--/#footer-->


    <div id="tmp" style="display: none;">
        <div class="reply-form">
            <textarea class="text" placeholder="回复 :"></textarea>
            <span class="num-box"><span class="num">500</span></span>
            <div class="btn-box">
                <div class="fr">
                    <a href="javascript:;" class="btn btn-sure dis" set-lan="html:btn_reply"></a>
                </div>
            </div>
        </div>
    </div>


    <!-- 通用js start-->
    <!-- <script src="./js/common.js" type="text/javascript"></script> -->
    <!-- 通用js end-->
    <!-- 裁剪插件js start-->
    <script src="./js/cropper.js" type="text/javascript"></script>
    <!-- 裁剪插件js start-->

    </script>
    <script type="text/javascript" src="../js/jquery-1.9.1.min.js"></script>
    <script type="text/javascript" src="../js/jquery-i18next.min.js"></script>


    <script type="text/javascript" src="./js/community.js"></script>
    <script type="text/javascript" src="../js/api.js"></script>
    <script type="text/javascript" src="../js/personal.js"></script>
    <script type="text/javascript" src="../js/ezblock.js"></script>
    <script type="text/javascript" src="../js/nav.js"></script>
    <script type="text/javascript" src="../js/utils.js"></script>
    <script type="text/javascript" src="../js/sign.js"></script>

    <script type="text/javascript" src="../msg/lan_cn.js"></script>
    <script type="text/javascript" src="../msg/lan_en.js"></script>

    <script type="text/javascript" src="./js/myProject.js"></script>
    <script>
        $(document).ready(function () {
            Community.renderOthers(Community.accessID);
            Community.getOwnProject();
        });

    </script>
</body>

</html>
